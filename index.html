<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Bodoni Moda', serif; }
    .container { display: flex; flex-direction: column; align-items: center; gap: 2rem; }
    #display { font-size: 72px; color: #2C3B2A; letter-spacing: 4px; }
    .buttons { display: flex; gap: 12px; }
    button { font-family: 'Bodoni Moda', serif; font-size: 14px; padding: 8px 24px; border-radius: 8px; border: 0.5px solid #8A7A5A; background: transparent; color: #2C3B2A; cursor: pointer; }
    button:hover { background: #E8E0CC; }
    .dots-row { display: flex; gap: 16px; }
    .dot-col { text-align: center; }
    .day-label { font-size: 11px; color: #8A7A5A; margin-bottom: 6px; }
    .dot { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #8A7A5A; background: transparent; margin: 0 auto; transition: background 0.4s; }
    .dot.filled { background: #2C3B2A; border-color: #2C3B2A; }
  </style>
</head>
<body>
  <div class="container">
    <div id="display">25:00</div>
    <div class="buttons">
      <button onclick="startTimer()">Start</button>
      <button onclick="pauseTimer()">Pause</button>
      <button onclick="stopTimer()">Stop</button>
    </div>
    <div class="dots-row">
      <div class="dot-col"><div class="day-label">Mon</div><div class="dot" id="dot-0"></div></div>
      <div class="dot-col"><div class="day-label">Tue</div><div class="dot" id="dot-1"></div></div>
      <div class="dot-col"><div class="day-label">Wed</div><div class="dot" id="dot-2"></div></div>
      <div class="dot-col"><div class="day-label">Thu</div><div class="dot" id="dot-3"></div></div>
      <div class="dot-col"><div class="day-label">Fri</div><div class="dot" id="dot-4"></div></div>
      <div class="dot-col"><div class="day-label">Sat</div><div class="dot" id="dot-5"></div></div>
      <div class="dot-col"><div class="day-label">Sun</div><div class="dot" id="dot-6"></div></div>
    </div>
  </div>

  <script>
    const TOTAL = 25 * 60;
    let remaining = TOTAL, interval = null, running = false;

    // تشخیص دوشنبه برای ریست هفتگی
    function getWeekId() {
      const d = new Date();
      const day = d.getDay();
      const diff = d.getDate() - (day === 0 ? 6 : day - 1);
      d.setDate(diff);
      return d.toDateString();
    }

    function init() {
      const savedWeek = localStorage.getItem('weekId');
      const currentWeek = getWeekId();

      // اگر هفته جدید است، ریست کن
      if (savedWeek !== currentWeek) {
        localStorage.setItem('weekId', currentWeek);
        localStorage.setItem('filledDays', JSON.stringify([]));
      }

      // پر کردن دایره‌های ذخیره شده
      const filledDays = JSON.parse(localStorage.getItem('filledDays') || "[]");
      filledDays.forEach(dayIndex => {
        document.getElementById('dot-' + dayIndex)?.classList.add('filled');
      });
    }

    function fmt(s) {
      const m = Math.floor(s / 60), sec = s % 60;
      return (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
    }

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, ctx.currentTime);
        gain.gain.setValueAtTime(0.3, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 1.2);
      } catch (e) {}
    }

    function startTimer() {
      if (running) return;
      // اگر تایمر به صفر رسیده، ابتدا ریست کن
      if (remaining <= 0) {
        remaining = TOTAL;
        document.getElementById('display').textContent = fmt(remaining);
      }
      running = true;
      interval = setInterval(() => {
        remaining--;
        document.getElementById('display').textContent = fmt(remaining);
        if (remaining <= 0) {
          clearInterval(interval);
          running = false;

          // تعیین اندیس روز (Mon=0, Tue=1 ... Sun=6)
          const d = new Date();
          const today = (d.getDay() === 0 ? 6 : d.getDay() - 1);

          document.getElementById('dot-' + today)?.classList.add('filled');

          let filledDays = JSON.parse(localStorage.getItem('filledDays') || "[]");
          if (!filledDays.includes(today)) {
            filledDays.push(today);
            localStorage.setItem('filledDays', JSON.stringify(filledDays));
          }

          // صدای اعلام پایان
          beep();
        }
      }, 1000);
    }

    function pauseTimer() { clearInterval(interval); running = false; }

    function stopTimer() {
      clearInterval(interval);
      running = false;
      remaining = TOTAL;
      document.getElementById('display').textContent = fmt(remaining);
    }

    init();
  </script>
</body>
</html>
